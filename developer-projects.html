<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Developer Projects | Residential Property KL</title>

  <link rel="stylesheet" href="/shared-layout.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #111;
    }

    .hero {
      height: 340px;
      position: relative;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      color: white;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.15)
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding-bottom: 40px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 48px;
    }

    .hero p {
      margin: 0;
      font-size: 18px;
      opacity: 0.95;
      max-width: 700px;
      line-height: 1.7;
    }

    .projects-section {
      padding: 50px 0 80px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .project-card {
      background: white;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      text-decoration: none;
      color: inherit;
    }

    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 45px rgba(0,0,0,0.16);
    }

    .project-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }

    .project-card-content {
      padding: 22px;
    }

    .project-card h3 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.3;
    }

    .project-location {
      color: #4da6ff;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .project-card p {
      margin: 0;
      color: #555;
      line-height: 1.8;
    }

    .loading,
    .empty {
      text-align: center;
      padding: 80px 20px;
      font-size: 18px;
      color: #666;
    }

    @media (max-width: 980px) {
      .projects-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 820px) {
      .hero {
        height: 260px;
      }

      .hero h1 {
        font-size: 34px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .project-card img {
        height: 220px;
      }
    }
  </style>
</head>

<body>

<div id="header-placeholder"></div>

<div id="hero" class="hero">
  <div class="container hero-content">
    <h1 id="developerTitle">Developer Projects</h1>
    <p id="developerDescription"></p>
  </div>
</div>

<section class="projects-section">
  <div class="container">

    <div id="projectsGrid" class="projects-grid">
      <div class="loading">Loading projects...</div>
    </div>

  </div>
</section>

<div id="footer-placeholder"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
  authDomain: "residentialpropertykl.firebaseapp.com",
  projectId: "residentialpropertykl",
  storageBucket: "residentialpropertykl.firebasestorage.app",
  messagingSenderId: "952845303526",
  appId: "1:952845303526:web:7b604dca11ad50a93bc527",
  measurementId: "G-DV21X2EGJ0"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const developerId = new URLSearchParams(window.location.search).get("id");

  const hero = document.getElementById("hero");
  const developerTitle = document.getElementById("developerTitle");
  const developerDescription = document.getElementById("developerDescription");
  const projectsGrid = document.getElementById("projectsGrid");

  async function loadDeveloper() {
    try {
      const developerQuery = query(
        collection(db, "developers"),
        where("__name__", "==", developerId)
      );

      const snapshot = await getDocs(developerQuery);

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        developerTitle.innerText = data.name || "Developer Projects";
        developerDescription.innerText = data.description || "";

        if (data.coverImage) {
          hero.style.backgroundImage = `url('${data.coverImage}')`;
        }
      });
    } catch (error) {
      console.error(error);
    }
  }

  async function loadProjects() {
    try {
      const snapshot = await getDocs(collection(db, "projects"));

      const projects = [];

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        if (
          data.status === "published" &&
          data.developerId === developerId
        ) {
          projects.push({
            id: docSnap.id,
            ...data
          });
        }
      });

      projects.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (!projects.length) {
        projectsGrid.innerHTML = `
          <div class="empty">
            No projects found under this developer.
          </div>
        `;
        return;
      }

      projectsGrid.innerHTML = projects.map((project) => `
        <a 
          class="project-card"
          href="/project/${project.slug || "project"}-${project.id}"
        >
          <img src="${project.coverImage || ''}" alt="${project.title || ''}">

          <div class="project-card-content">
            <h3>${project.title || ''}</h3>

            <div class="project-location">
              ${project.location || ''}
            </div>

            <p>
              ${project.shortDescription || ''}
            </p>
          </div>
        </a>
      `).join("");

    } catch (error) {
      console.error(error);

      projectsGrid.innerHTML = `
        <div class="empty">
          Failed to load projects.
        </div>
      `;
    }
  }

  async function loadSharedLayout() {
    const header = await fetch("/header.html").then(r => r.text());
    const footer = await fetch("/footer.html").then(r => r.text());

    document.getElementById("header-placeholder").innerHTML = header;
    document.getElementById("footer-placeholder").innerHTML = footer;
  }

  await loadSharedLayout();
  await loadDeveloper();
  await loadProjects();
</script>

</body>
</html>
