<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Projects | Residential Property KL</title>

  <meta name="description"
    content="Browse all residential property projects in Kuala Lumpur and Selangor." />

  <link rel="stylesheet" href="/shared-layout.css">
  <meta name="theme-color" content="#4da6ff" />

  <style>

    body{
      margin:0;
      background:#f5f5f5;
      font-family:Arial;
    }

    .page-header{
      padding:40px 0 20px;
    }

    .page-title{
      font-size:42px;
      margin:0 0 10px;
      color:#111;
    }

    .project-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:24px;
      padding-bottom:60px;
    }

    .project-card{
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
      transition:0.25s ease;
      cursor:pointer;
    }

    .project-card:hover{
      transform:translateY(-5px);
      box-shadow:0 18px 40px rgba(0,0,0,0.12);
    }

    .project-image{
      width:100%;
      height:260px;
      background-size:cover;
      background-position:center;
    }

    .project-body{
      padding:22px;
    }

    .project-title{
      font-size:26px;
      font-weight:800;
      margin:0 0 12px;
      color:#111;
      line-height:1.3;
    }

    .project-location{
      color:#666;
      font-size:15px;
      margin-bottom:12px;
    }

    .project-short{
      color:#444;
      line-height:1.7;
      font-size:15px;
    }

    .empty{
      background:#fff;
      border-radius:12px;
      padding:30px;
      text-align:center;
    }

    @media (max-width:820px){

      .project-image{
        height:220px;
      }

      .project-title{
        font-size:22px;
      }

    }

@media (min-width: 821px) {
  .topbar {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    z-index: 9999 !important;
    background: #4da6ff !important;
  }

  body {
    padding-top: 100px;
  }
}

  </style>
</head>

<body>

<div id="site-header"></div>

<main class="container">

  <div class="page-header">
    <h1 class="page-title">All Projects</h1>

    <p style="color:#555; line-height:1.7;">
      Browse new residential projects across Kuala Lumpur and Selangor.
    </p>
  </div>

  <div id="projectGrid" class="project-grid"></div>

</main>

<div id="site-footer"></div>

<script type="module" src="/shared-layout.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
  authDomain: "residentialpropertykl.firebaseapp.com",
  projectId: "residentialpropertykl",
  storageBucket: "residentialpropertykl.firebasestorage.app",
  messagingSenderId: "952845303526",
  appId: "1:952845303526:web:7b604dca11ad50a93bc527",
  measurementId: "G-DV21X2EGJ0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const projectGrid = document.getElementById("projectGrid");

function makeProjectSlug(title) {
  return (title || "project")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");
}

async function loadProjects(){

  const snapshot = await getDocs(collection(db,"developers"));

  if(snapshot.empty){
    projectGrid.innerHTML = `
      <div class="empty">
        No projects found.
      </div>
    `;
    return;
  }

  const developers = [];

  snapshot.forEach((docSnap)=>{

    const data = docSnap.data();

    if(data.status === "published"){

      developers.push({
        id: docSnap.id,
        ...data
      });

    }

  });

  developers.sort((a,b)=>(b.createdAt || 0) - (a.createdAt || 0));

  projectGrid.innerHTML = developers.map(developer=>{

    const url =
    `/developer-projects.html?id=${developer.id}`;

    return `
      <a class="project-card" href="${url}">

        <div class="project-image"
          style="background-image:url('${developer.coverImage || ""}')">
        </div>

        <div class="project-body">

          <h2 class="project-title">
            ${developer.name || ""}
          </h2>

          <div class="project-location">
            ${developer.slug || ""}
          </div>

          <div class="project-short">
            ${developer.description || ""}
          </div>

        </div>

      </a>
    `;

  }).join("");

}

loadProjects();

</script>

</body>
</html>
