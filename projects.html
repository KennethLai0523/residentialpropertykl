<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico?v=2">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>All Projects | Residential Property KL</title>
  <meta name="description" content="Browse residential new launch projects and developer collections across Kuala Lumpur and Selangor." />
  <meta name="theme-color" content="#1B4332" />

  <link rel="stylesheet" href="/shared-layout.css?v=70" />

  <style>
    :root {
      --bg: #F7F5F0;
      --dark: #111;
      --muted: #666;
      --green: #1B4332;
      --gold: #EADFCB;
      --line: rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--dark);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1240px, calc(100% - 40px));
      margin: 0 auto;
    }

    @keyframes heroZoom {
      from { transform: scale(1.03); }
      to { transform: scale(1.1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(35px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .topbar {
      animation: slideDown 0.55s ease both;
    }

    .projects-hero {
      position: relative;
      min-height: 600px;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: #0f1713;
      color: #fff;
    }

    .projects-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(15,23,19,0.96) 0%,
          rgba(15,23,19,0.82) 42%,
          rgba(15,23,19,0.20) 78%
        ),
        url("/images/hero-residential-green.jpg") center/cover no-repeat;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }

    .projects-hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 130px;
      background: linear-gradient(to top, var(--bg), transparent);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: min(860px, 100%);
      padding: 160px 0 130px;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(14px);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .5px;
      animation: fadeUp .8s ease .1s both;
    }

    .hero-tag::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
    }

    .projects-hero h1 {
      margin: 26px 0 22px;
      font-size: clamp(52px, 7vw, 92px);
      line-height: .96;
      letter-spacing: -3px;
      animation: fadeUp .8s ease .22s both;
    }

    .projects-hero p {
      margin: 0;
      max-width: 720px;
      color: rgba(255,255,255,.82);
      font-size: 18px;
      line-height: 1.9;
      animation: fadeUp .8s ease .34s both;
    }

    .projects-panel {
      position: relative;
      z-index: 5;
      margin-top: -80px;
      padding-bottom: 110px;
    }

    .summary-card {
      background: rgba(255,255,255,.84);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 30px;
      box-shadow: 0 24px 80px rgba(0,0,0,.12);
      padding: 24px;
      margin-bottom: 34px;
      animation: cardReveal .75s ease .42s both;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .breadcrumb {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .project-count {
      font-weight: 900;
      color: var(--green);
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 26px;
    }

    .project-card {
      background: #fff;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 46px rgba(0,0,0,.06);
      animation: cardReveal .65s ease both;
      transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease;
    }

    .project-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 80px rgba(0,0,0,.13);
      border-color: rgba(27,67,50,.16);
    }

    .project-image {
      position: relative;
      height: 280px;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .project-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.34), transparent 58%);
    }

    .project-badge {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 2;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(234,223,203,.94);
      color: var(--green);
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .project-body {
      padding: 24px;
    }

    .project-title {
      margin: 0 0 12px;
      font-size: 25px;
      line-height: 1.28;
      letter-spacing: -.5px;
    }

    .project-location {
      display: inline-flex;
      width: fit-content;
      min-height: 32px;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      background: #F1EEE7;
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .project-short {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

    .empty {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 34px;
      text-align: center;
      color: var(--muted);
      box-shadow: 0 16px 46px rgba(0,0,0,.06);
    }

    @media (max-width: 1100px) {
      .project-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .container {
        width: calc(100% - 24px);
      }

      .projects-hero {
        min-height: 560px;
      }

      .hero-content {
        padding: 140px 0 110px;
      }

      .projects-hero h1 {
        letter-spacing: -1.7px;
      }

      .project-grid {
        grid-template-columns: 1fr;
      }

      .project-image {
        height: 240px;
      }
    }
  </style>
</head>

<body>

<div id="site-header"></div>

<section class="projects-hero">
  <div class="container">
    <div class="hero-content">
      <div class="hero-tag">New Project Collections</div>
      <h1>Explore Residential Developers.</h1>
      <p>
        Browse developer collections and new launch residential projects across
        Kuala Lumpur and Selangor.
      </p>
    </div>
  </div>
</section>

<main class="projects-panel">
  <div class="container">
    <div class="summary-card">
      <div class="summary-row">
        <div>
          <div class="breadcrumb">Home › New Projects</div>
          <div class="project-count" id="projectCount">Loading projects...</div>
        </div>
      </div>
    </div>

    <div id="projectGrid" class="project-grid"></div>
  </div>
</main>

<div id="site-footer"></div>

<script type="module" src="/shared-layout.js?v=70"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
    authDomain: "residentialpropertykl.firebaseapp.com",
    projectId: "residentialpropertykl",
    storageBucket: "residentialpropertykl.firebasestorage.app",
    messagingSenderId: "952845303526",
    appId: "1:952845303526:web:7b604dca11ad50a93bc527",
    measurementId: "G-DV21X2EGJ0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const projectGrid = document.getElementById("projectGrid");
  const projectCount = document.getElementById("projectCount");

  function getSortTime(value) {
    if (!value) return 0;
    if (typeof value?.toDate === "function") return value.toDate().getTime();
    if (value?.seconds) return value.seconds * 1000;
    if (typeof value === "number") return value;
    const parsed = new Date(value).getTime();
    return Number.isNaN(parsed) ? 0 : parsed;
  }

  function escapeHtml(str = "") {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  async function loadProjects() {
    try {
      const snapshot = await getDocs(collection(db, "developers"));
      const developers = [];

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        if (data.status === "published") {
          developers.push({
            id: docSnap.id,
            ...data
          });
        }
      });

      developers.sort((a, b) => getSortTime(b.createdAt) - getSortTime(a.createdAt));

      if (!developers.length) {
        projectCount.textContent = "0 developer collections";
        projectGrid.innerHTML = `<div class="empty">No projects found.</div>`;
        return;
      }

      projectCount.textContent = `${developers.length} developer collection${developers.length > 1 ? "s" : ""} available`;

      projectGrid.innerHTML = developers.map((developer, index) => {
        const name = escapeHtml(developer.name || "Developer Collection");
        const description = escapeHtml(developer.description || "Explore residential projects from this developer.");
        const image = developer.coverImage || "/images/hero-residential-green.jpg";
        const slug = escapeHtml(developer.slug || "Developer");

        return `
          <a
            class="project-card"
            style="animation-delay:${Math.min(index * 0.07, 0.42)}s"
            href="/developer-projects.html?id=${developer.id}"
          >
            <div class="project-image" style="background-image:url('${image}')">
              <div class="project-badge">Developer</div>
            </div>

            <div class="project-body">
              <h2 class="project-title">${name}</h2>
              <div class="project-location">${slug}</div>
              <p class="project-short">${description}</p>
            </div>
          </a>
        `;
      }).join("");

    } catch (error) {
      console.error(error);
      projectCount.textContent = "Unable to load projects";
      projectGrid.innerHTML = `<div class="empty">Failed to load projects.</div>`;
    }
  }

  loadProjects();
</script>

</body>
</html>
