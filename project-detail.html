<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Detail | Industrial Property KL</title>
  <meta name="theme-color" content="#4da6ff" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/shared-layout.css">

  <style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #eef4fb;
  color: #111;
}

.hero {
  min-height: 620px;
  background-size: cover;
  background-position: center;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 80px 0;
  color: white;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(77,166,255,0.35), transparent 35%),
    linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.18));
}

.hero-inner {
  position: relative;
  z-index: 2;
  animation: slideUp 0.9s ease both;
}

.hero-title {
  font-size: 60px;
  line-height: 1.05;
  margin: 0 0 14px;
  max-width: 900px;
}

.hero-location {
  font-size: 20px;
  opacity: 0.95;
}

.project-summary {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  margin-top: -70px;
  position: relative;
  z-index: 5;
  padding: 32px;
  border-radius: 24px;
  box-shadow: 0 22px 55px rgba(0,0,0,0.16);
}

.project-summary p {
  font-size: 18px;
  line-height: 1.9;
  color: #333;
  margin: 0;
}

.flash-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  margin-top: 24px;
}

.flash-card {
  background: #fff;
  padding: 22px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  border: 1px solid rgba(77,166,255,0.25);
  animation: glowPulse 2.6s infinite ease-in-out;
}

.flash-card strong {
  display: block;
  font-size: 22px;
  margin-bottom: 6px;
  color: #111;
}

.flash-card span {
  color: #666;
  font-size: 14px;
}

.section {
  background: white;
  margin-top: 28px;
  padding: 38px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.07);
  animation: fadeIn 0.8s ease both;
}

.section h2 {
  margin-top: 0;
  font-size: 32px;
}

.content-text {
  white-space: pre-line;
  line-height: 2;
  font-size: 17px;
  color: #333;
}

.story-image {
  width: 100%;
  height: 430px;
  object-fit: cover;
  border-radius: 24px;
  margin: 34px 0;
  box-shadow: 0 18px 45px rgba(0,0,0,0.16);
  animation: imageSlide 0.9s ease both;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

.gallery img {
  width: 100%;
  height: 360px;
  object-fit: cover;
  border-radius: 18px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.12);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
}

.gallery img:hover {
  transform: scale(1.035);
  box-shadow: 0 20px 45px rgba(0,0,0,0.18);
}

.enquiry-box {
  background: linear-gradient(135deg, #4da6ff, #2f7de1);
  color: white;
  text-align: center;
  overflow: hidden;
  position: relative;
}

.enquiry-box::before {
  content: "";
  position: absolute;
  top: 0;
  left: -80%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  animation: shine 3s infinite;
}

.enquiry-box h2,
.enquiry-box p,
.enquiry-box a {
  position: relative;
  z-index: 2;
}

.btn {
  display: inline-block;
  padding: 16px 30px;
  background: #25D366;
  color: white;
  font-weight: bold;
  border-radius: 999px;
  margin-top: 15px;
  box-shadow: 0 10px 25px rgba(37,211,102,0.35);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(35px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes imageSlide {
  from { opacity: 0; transform: translateX(-35px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
  50% { box-shadow: 0 10px 35px rgba(77,166,255,0.35); }
}

@keyframes shine {
  0% { left: -80%; }
  100% { left: 130%; }
}

@media (max-width: 820px) {
  .hero {
    min-height: 460px;
    padding: 45px 0;
  }

  .hero-title {
    font-size: 36px;
  }

  .project-summary {
    margin-top: -45px;
    padding: 24px;
  }

  .flash-cards {
    grid-template-columns: 1fr;
  }

  .section {
    padding: 24px;
  }

  .gallery {
    grid-template-columns: 1fr;
  }

  .gallery img,
  .story-image {
    height: 250px;
  }
}

@media (min-width: 821px) {
  .topbar {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    z-index: 9999 !important;
    background: #4da6ff !important;
  }

  body {
    padding-top: 100px;
  }
}
  </style>
</head>

<body>

<div id="site-header"></div>

<div id="hero" class="hero">
  <div class="container hero-inner">
    <h1 id="heroTitle" class="hero-title"></h1>
    <div id="heroLocation" class="hero-location"></div>
  </div>
</div>

<div class="container">

  <div class="project-summary">
    <p id="shortDescription"></p>

    <div class="flash-cards">
      <div class="flash-card">
        <strong>Prime Location</strong>
        <span id="cardLocation">Loading...</span>
      </div>

      <div class="flash-card">
        <strong>New Project</strong>
        <span>Residential launch information</span>
      </div>

      <div class="flash-card">
        <strong>Viewing</strong>
        <span>Contact us for appointment</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Project Details</h2>
    <div id="projectStory" class="content-text"></div>
  </div>

  <div class="section">
    <h2>Gallery</h2>
    <div id="gallery" class="gallery"></div>
  </div>

  <div class="section enquiry-box">
    <h2>Interested in this project?</h2>
    <p>Contact us for price, availability and viewing arrangement.</p>
    <a class="btn" href="https://wa.me/60166287357" target="_blank">
      WhatsApp Kenneth
    </a>
  </div>

</div>

<div id="site-footer"></div>
<script type="module" src="/shared-layout.js"></script>

<script type="module">
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore();

function getProjectId() {
  const path = window.location.pathname;

  if (path.startsWith("/project/")) {
    const slugPart = path.replace("/project/", "").replace(/\/$/, "");
    if (!slugPart) return null;

    const parts = slugPart.split("-");
    return parts[parts.length - 1];
  }

  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadProject() {
  try {
    const id = getProjectId();

    if (!id) {
      document.querySelector(".container").innerHTML = `
        <div class="section">
          <h2>Project not found</h2>
          <p>Missing project id in URL.</p>
        </div>
      `;
      return;
    }

    const snap = await getDoc(doc(db, "projects", id));

    if (!snap.exists()) {
      document.querySelector(".container").innerHTML = `
        <div class="section">
          <h2>Project not found</h2>
          <p>No project record found for this id.</p>
        </div>
      `;
      return;
    }

    const data = snap.data();

document.getElementById("heroTitle").innerText = data.title || "";
document.getElementById("heroLocation").innerText = data.location || "";
document.getElementById("cardLocation").innerText = data.location || "Kuala Lumpur / Selangor";
document.getElementById("shortDescription").innerText = data.shortDescription || "";

const hero = document.getElementById("hero");
if (data.coverImage) {
  hero.style.backgroundImage = `url('${data.coverImage}')`;
}

const projectStory = document.getElementById("projectStory");
const content = data.fullContent || "";
const galleryImages = Array.isArray(data.galleryImages) ? data.galleryImages : [];

const paragraphs = content
  .split(/\n+/)
  .map(p => p.trim())
  .filter(Boolean);

let storyHTML = "";

paragraphs.forEach((paragraph, index) => {
  storyHTML += `<p>${paragraph}</p>`;

  const image = galleryImages[index];
  if (image) {
    storyHTML += `
      <img class="story-image" src="${image}" alt="${data.title || "Project image"}">
    `;
  }
});

projectStory.innerHTML = storyHTML;


    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    if (Array.isArray(data.galleryImages) && data.galleryImages.length > 0) {
      data.galleryImages.forEach((img) => {
        const image = document.createElement("img");
        image.src = img;
        image.alt = data.title || "Project image";
        gallery.appendChild(image);
      });
    }
  } catch (error) {
    console.error("Project detail error:", error);
    document.querySelector(".container").innerHTML = `
      <div class="section">
        <h2>Error loading project</h2>
        <p>Please check browser console.</p>
      </div>
    `;
  }
}

loadProject();
</script>

<div id="floating-nav-placeholder"></div>

<script>
  fetch("/floating-nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("floating-nav-placeholder").innerHTML = html;

      const btn = document.getElementById("navFloatBtn");
      const menu = document.getElementById("floatNavMenu");
      const waMenu = document.getElementById("waSlideMenu");

      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");

        // 🔥 THIS is what you are missing
        waMenu.classList.toggle("show");
      });
    });
</script>

</body>
</html>
