<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agent Profile | Industrial Property KL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4da6ff" />
  <link rel="stylesheet" href="/shared-layout.css?v=12" />

  <style>
    .agent-page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .agent-profile {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 24px;
      align-items: center;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 36px;
    }

    .agent-profile img {
      width: 180px;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
    }

    .agent-profile h1 {
      margin: 0 0 8px;
    }

    .agent-role {
      color: #666;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .listing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .listing-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 14px;
      overflow: hidden;
    }

    .listing-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .listing-body {
      padding: 16px;
    }

    .listing-body h3 {
      margin: 0 0 8px;
    }

    .listing-price {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    @media (max-width: 820px) {
      .agent-profile {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .agent-profile img {
        margin: 0 auto;
      }

      .listing-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <main class="agent-page">
    <div id="agentProfile">Loading agent...</div>

    <h2>Agent Listings</h2>
    <div id="agentListings" class="listing-grid"></div>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="/shared-layout.js?v=12"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
      authDomain: "residentialpropertykl.firebaseapp.com",
      projectId: "residentialpropertykl",
      storageBucket: "residentialpropertykl.firebasestorage.app",
      messagingSenderId: "952845303526",
      appId: "1:952845303526:web:7b604dca11ad50a93bc527",
      measurementId: "G-DV21X2EGJ0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const agents = {
      "kenneth-lai": {
        id: "kenneth-lai",
        name: "Kenneth Lai",
        role: "Industrial Property Specialist",
        image: "/images/kenneth.png",
        phone: "+60 16-628 7357",
        email: "kennethrealtyconsultancy@gmail.com"
      },
      "agnes-chee": {
        id: "agnes-chee",
        uid: "yImg7iNMQrdukuqPJZ8wvU5zOX93",
        name: "Agnes Chee",
        role: "Senior Negotiator",
        image: "/images/agnes.png",
        phone: "+60 12-289 5038",
        email: "agnescheesy88@yahoo.com"
      },

      "andrew-yap": {
        id: "andrew-yap",
        uid: "xEn4hu0xHyayQVHBbnU3vbf7yp33",
        name: "Andrew Yap",
        role: "Industrial Analyst",
        image: "/images/andrew.png",
        phone: "+60 19-286 2772",
        email: "andrew.polygon@gmail.com"
      },

      "magdalene": {
        id: "magdalene",
        uid: "NjZtwrq6lUZNIpewLadKrLPUetM2",
        name: "Magdalene",
        role: "Residential Consultant",
        image: "/images/magdalene.png",
        phone: "+60 12-891 8615",
        email: "magdalene18615@gmail.com"
      }


    };

    function getAgentId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function formatPrice(price) {
      return price || "-";
    }

    function makeSlug(title) {
      return (title || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\\s-]/g, "")
        .replace(/\\s+/g, "-")
        .replace(/-+/g, "-");
    }

    async function loadAgentPage() {
      const agentId = getAgentId();
      const agent = agents[agentId];

      if (!agent) {
        document.getElementById("agentProfile").innerHTML = "<p>Agent not found.</p>";
        document.getElementById("agentListings").innerHTML = "";
        return;
      }

      document.title = `${agent.name} | Industrial Property KL`;

      document.getElementById("agentProfile").innerHTML = `
        <div class="agent-profile">
          <img src="${agent.image}" alt="${agent.name}">
          <div>
            <h1>${agent.name}</h1>
            <div class="agent-role">${agent.role}</div>
            <div><strong>Phone:</strong> ${agent.phone}</div>
            <div><strong>Email:</strong> ${agent.email}</div>
          </div>
        </div>
      `;

      const q = query(
        collection(db, "listings"),
        where("agentId", "==", agent.id)
      );

      const snapshot = await getDocs(q);
      const listingBox = document.getElementById("agentListings");

      if (snapshot.empty) {
        listingBox.innerHTML = "<p>No listings yet.</p>";
        return;
      }

      listingBox.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const item = docSnap.data();

        const card = document.createElement("div");
        card.className = "listing-card";

        card.innerHTML = `
          <img src="${item.image || "/images/default-property.jpg"}" alt="${item.title || "Listing"}">
          <div class="listing-body">
            <div class="listing-price">${formatPrice(item.price)}</div>
            <h3>${item.title || "-"}</h3>
            <p>${item.location || ""}, ${item.state || ""}</p>
            <p><strong>Built-up:</strong> ${item.bua || "-"}</p>
            <a class="btn-primary" href="/listing/${item.slug || makeSlug(item.title)}">Details</a>
          </div>
        `;

        listingBox.appendChild(card);
      });
    }

    loadAgentPage();
  </script>
</body>
</html>
