<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico?v=2">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blog Detail | Residential Property KL</title>
  <meta name="description" id="metaDesc" content="Read residential property guides and market insights from Residential Property KL." />
  <meta name="theme-color" content="#1B4332" />

  <link rel="stylesheet" href="/shared-layout.css?v=90" />

  <style>
    :root {
      --bg: #F7F5F0;
      --dark: #111;
      --muted: #666;
      --green: #1B4332;
      --green2: #2D6A4F;
      --gold: #EADFCB;
      --line: rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--dark);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    @keyframes heroZoom {
      from { transform: scale(1.03); }
      to { transform: scale(1.1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(35px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .topbar {
      animation: slideDown 0.55s ease both;
    }

    .loading-state,
    .error-state {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 18px;
    }

    .blog-hero {
      position: relative;
      min-height: 700px;
      display: flex;
      align-items: end;
      overflow: hidden;
      background: #0f1713;
      color: #fff;
    }

    .blog-hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }

    .blog-hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(0,0,0,0.08) 0%,
          rgba(0,0,0,0.35) 42%,
          rgba(0,0,0,0.86) 100%
        );
    }

    .blog-hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 140px;
      background: linear-gradient(to top, var(--bg), transparent);
      z-index: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 170px 0 120px;
    }

    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      margin-bottom: 24px;
      animation: fadeUp .8s ease .05s both;
    }

    .breadcrumb a {
      color: rgba(255,255,255,0.9);
      font-weight: 800;
    }

    .article-category {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: rgba(234,223,203,0.92);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 18px;
      animation: fadeUp .8s ease .12s both;
    }

    .article-title {
      margin: 0;
      max-width: 980px;
      font-size: clamp(46px, 7vw, 90px);
      line-height: .96;
      letter-spacing: -3px;
      animation: fadeUp .8s ease .22s both;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      margin-top: 24px;
      color: rgba(255,255,255,.82);
      font-size: 15px;
      animation: fadeUp .8s ease .34s both;
    }

    .article-main {
      position: relative;
      z-index: 5;
      margin-top: -80px;
      padding-bottom: 110px;
    }

    .article-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 28px;
      align-items: start;
    }

    .article-card {
      background: #fff;
      border-radius: 34px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 24px 80px rgba(0,0,0,.10);
      overflow: hidden;
      animation: cardReveal .75s ease .42s both;
    }

    .article-cover {
      height: 520px;
      background: #ddd;
      overflow: hidden;
    }

    .article-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease;
    }

    .article-card:hover .article-cover img {
      transform: scale(1.03);
    }

    .article-body {
      padding: 44px;
    }

    .article-content {
      color: #333;
      font-size: 17px;
      line-height: 2;
    }

    .article-content p {
      margin: 0 0 1.25em;
    }

    .article-content h2,
    .article-content h3,
    .article-content h4 {
      color: var(--green);
      line-height: 1.15;
      letter-spacing: -0.8px;
      margin: 1.6em 0 0.7em;
    }

    .article-content h2 {
      font-size: 34px;
    }

    .article-content h3 {
      font-size: 26px;
    }

    .article-content ul,
    .article-content ol {
      padding-left: 1.4rem;
      margin: 0 0 1.3em;
    }

    .article-content li {
      margin-bottom: 0.55em;
    }

    .article-content strong {
      color: var(--green);
    }

    .side-card {
      position: sticky;
      top: 110px;
      background:
        linear-gradient(rgba(27,67,50,.94), rgba(27,67,50,.96)),
        url("/images/hero-residential-green.jpg") center/cover no-repeat;
      color: #fff;
      border-radius: 34px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.18);
      animation: cardReveal .7s ease .5s both;
    }

    .side-card h3 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: -0.8px;
    }

    .side-card p {
      margin: 0;
      color: rgba(255,255,255,.78);
      line-height: 1.8;
      font-size: 14px;
    }

    .side-actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .side-btn {
      height: 52px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .side-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .side-btn-wa {
      background: #25D366;
      color: #fff;
    }

    .side-btn-light {
      background: #fff;
      color: var(--green);
    }

    .side-btn-outline {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,.2);
    }

    .back-row {
      margin-top: 28px;
    }

    .back-button {
      height: 54px;
      padding: 0 22px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .back-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,.16);
    }

    .more-card {
      margin-top: 28px;
      background: rgba(255,255,255,.86);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 30px;
      padding: 26px;
      box-shadow: 0 18px 58px rgba(0,0,0,.08);
      animation: cardReveal .75s ease .55s both;
    }

    .more-card h3 {
      margin: 0 0 10px;
      color: var(--green);
      font-size: 24px;
    }

    .more-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 1000px) {
      .article-shell {
        grid-template-columns: 1fr;
      }

      .side-card {
        position: relative;
        top: auto;
      }
    }

    @media (max-width: 700px) {
      .container {
        width: calc(100% - 24px);
      }

      .blog-hero {
        min-height: 620px;
      }

      .hero-inner {
        padding: 150px 0 100px;
      }

      .article-title {
        letter-spacing: -1.7px;
      }

      .article-cover {
        height: 330px;
      }

      .article-body {
        padding: 26px;
      }

      .article-card,
      .side-card,
      .more-card {
        border-radius: 26px;
      }

      .article-content {
        font-size: 16px;
      }

      .article-content h2 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

<div id="site-header"></div>

<div id="app">
  <div id="loadingState" class="loading-state">Loading article...</div>
  <div id="errorState" class="error-state" style="display:none;">Blog post not found.</div>
</div>

<div id="site-footer"></div>

<script type="module" src="/shared-layout.js?v=90"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
    authDomain: "residentialpropertykl.firebaseapp.com",
    projectId: "residentialpropertykl",
    storageBucket: "residentialpropertykl.firebasestorage.app",
    messagingSenderId: "952845303526",
    appId: "1:952845303526:web:7b604dca11ad50a93bc527",
    measurementId: "G-DV21X2EGJ0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const appWrap = document.getElementById("app");
  const loadingState = document.getElementById("loadingState");
  const errorState = document.getElementById("errorState");

  function getBlogKey() {
    const path = window.location.pathname;

    if (path.startsWith("/blog/")) {
      return path.replace("/blog/", "").replace(/\/$/, "") || null;
    }

    const params = new URLSearchParams(window.location.search);
    return params.get("id");
  }

  function formatDate(value) {
    if (!value) return "No date";

    try {
      let date;

      if (typeof value?.toDate === "function") {
        date = value.toDate();
      } else if (value?.seconds) {
        date = new Date(value.seconds * 1000);
      } else {
        date = new Date(value);
      }

      if (isNaN(date.getTime())) return "No date";

      return date.toLocaleDateString("en-MY", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    } catch {
      return "No date";
    }
  }

  function escapeHtml(str = "") {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function renderContent(content = "") {
    if (/<[a-z][\s\S]*>/i.test(content)) {
      return content;
    }

    return escapeHtml(content)
      .split(/\n\s*\n/)
      .map(block => block.trim())
      .filter(Boolean)
      .map(block => `<p>${block.replace(/\n/g, "<br>")}</p>`)
      .join("");
  }

  async function getBlogDoc(blogKey) {
    const directRef = doc(db, "blogs", blogKey);
    const directSnap = await getDoc(directRef);

    if (directSnap.exists()) {
      return directSnap;
    }

    const slugQuery = query(
      collection(db, "blogs"),
      where("slug", "==", blogKey)
    );

    const slugSnap = await getDocs(slugQuery);

    if (!slugSnap.empty) {
      return slugSnap.docs[0];
    }

    return null;
  }

  async function loadBlogDetail() {
    const blogKey = getBlogKey();

    if (!blogKey) {
      loadingState.style.display = "none";
      errorState.style.display = "flex";
      errorState.textContent = "Missing blog ID in URL.";
      return;
    }

    try {
      const blogSnap = await getBlogDoc(blogKey);

      if (!blogSnap) {
        loadingState.style.display = "none";
        errorState.style.display = "flex";
        return;
      }

      const data = blogSnap.data();

      const title = data.title || "Untitled Post";
      const coverImage = data.coverImage || "/images/blog-residential-1.jpg";
      const author = data.authorName || data.author || "Residential Property KL Group";
      const category = data.category || "Property Insight";
      const date = formatDate(data.createdAt || data.publishedAt);
      const content = data.content || "No content available.";
      const description = data.excerpt || data.metaDescription || `Read ${title} from Residential Property KL.`;

      document.title = `${title} | Residential Property KL`;

      const metaDesc = document.getElementById("metaDesc");
      if (metaDesc) {
        metaDesc.setAttribute("content", description);
      }

      appWrap.innerHTML = `
        <section class="blog-hero">
          <div class="blog-hero-bg" style="background-image:url('${coverImage}')"></div>
          <div class="blog-hero-overlay"></div>

          <div class="container hero-inner">
            <div class="breadcrumb">
              <a href="/index.html">Home</a>
              <span>›</span>
              <a href="/blog.html">Blog</a>
              <span>›</span>
              <span>${escapeHtml(title)}</span>
            </div>

            <div class="article-category">${escapeHtml(category)}</div>

            <h1 class="article-title">${escapeHtml(title)}</h1>

            <div class="article-meta">
              <span>By ${escapeHtml(author)}</span>
              <span>${escapeHtml(date)}</span>
            </div>
          </div>
        </section>

        <main class="article-main">
          <div class="container">

            <div class="article-shell">

              <article class="article-card">
                <div class="article-cover">
                  <img src="${coverImage}" alt="${escapeHtml(title)}">
                </div>

                <div class="article-body">
                  <div class="article-content">
                    ${renderContent(content)}
                  </div>
                </div>
              </article>

              <aside>
                <div class="side-card">
                  <h3>Need Property Advice?</h3>
                  <p>
                    Speak with Residential Property KL for buying, renting,
                    investment and new project guidance across KL & Selangor.
                  </p>

                  <div class="side-actions">
                    <a href="https://wa.me/60166287357" target="_blank" class="side-btn side-btn-wa">
                      WhatsApp Us
                    </a>

                    <a href="/categories/all-listings" class="side-btn side-btn-light">
                      View Listings
                    </a>

                    <a href="/contact.html" class="side-btn side-btn-outline">
                      Contact Us
                    </a>
                  </div>
                </div>

                <div class="more-card">
                  <h3>Explore More</h3>
                  <p>
                    Browse more residential property articles, market updates
                    and lifestyle guides.
                  </p>

                  <a class="back-button" href="/blog.html">
                    ← Back to Blog
                  </a>
                </div>
              </aside>

            </div>

          </div>
        </main>
      `;

    } catch (error) {
      console.error("Error loading blog detail:", error);
      loadingState.style.display = "none";
      errorState.style.display = "flex";
      errorState.textContent = "Failed to load blog post.";
    }
  }

  loadBlogDetail();
</script>

<div id="floating-nav-placeholder"></div>

<script>
  fetch("/floating-nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("floating-nav-placeholder").innerHTML = html;

      const btn = document.getElementById("navFloatBtn");
      const menu = document.getElementById("floatNavMenu");
      const waMenu = document.getElementById("waSlideMenu");

      if (btn && menu && waMenu) {
        btn.addEventListener("click", () => {
          menu.classList.toggle("hidden");
          waMenu.classList.toggle("show");
        });
      }
    });
</script>

</body>
</html>
