<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico?v=2">
  <link rel="canonical" id="canonical-link">
  <meta name="description" id="meta-desc" content="Residential property listing in Kuala Lumpur and Selangor.">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Property Detail | Residential Property KL</title>
  <meta name="theme-color" content="#1B4332" />

  <link rel="stylesheet" href="/shared-layout.css?v=80" />

  <style>
    :root {
      --bg: #F7F5F0;
      --dark: #111;
      --muted: #666;
      --green: #1B4332;
      --green2: #2D6A4F;
      --gold: #EADFCB;
      --line: rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--dark);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1240px, calc(100% - 40px));
      margin: 0 auto;
    }

    @keyframes heroZoom {
      from { transform: scale(1.03); }
      to { transform: scale(1.1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(35px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .topbar {
      animation: slideDown 0.55s ease both;
    }

    .loading,
    .error {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 18px;
    }

    .listing-hero {
      position: relative;
      min-height: 760px;
      display: flex;
      align-items: end;
      overflow: hidden;
      color: #fff;
      background: #0f1713;
    }

    .listing-hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }

    .listing-hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(0,0,0,0.08) 0%,
          rgba(0,0,0,0.28) 42%,
          rgba(0,0,0,0.84) 100%
        );
    }

    .listing-hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 150px;
      background: linear-gradient(to top, var(--bg), transparent);
      z-index: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 180px 0 120px;
    }

    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      margin-bottom: 24px;
      animation: fadeUp .8s ease .05s both;
    }

    .breadcrumb a {
      color: rgba(255,255,255,0.9);
      font-weight: 800;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      animation: fadeUp .8s ease .12s both;
    }

    .detail-badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: rgba(234,223,203,0.92);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .detail-badge.hot {
      background: #e53935;
      color: #fff;
    }

    .hero-title {
      margin: 0;
      max-width: 980px;
      font-size: clamp(46px, 7vw, 92px);
      line-height: .96;
      letter-spacing: -3px;
      animation: fadeUp .8s ease .22s both;
    }

    .hero-location {
      margin-top: 22px;
      color: rgba(255,255,255,.84);
      font-size: 18px;
      line-height: 1.8;
      animation: fadeUp .8s ease .34s both;
    }

    .hero-price-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 34px;
      animation: fadeUp .8s ease .46s both;
    }

    .hero-price {
      min-height: 60px;
      padding: 0 26px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--green);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 18px 46px rgba(0,0,0,.18);
    }

    .hero-btn {
      min-height: 60px;
      padding: 0 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .hero-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .hero-btn-wa {
      background: #25D366;
      color: #fff;
    }

    .hero-btn-dark {
      background: var(--green);
      color: #fff;
    }

    .detail-main {
      position: relative;
      z-index: 5;
      margin-top: -80px;
      padding-bottom: 110px;
    }

    .summary-card {
      background: rgba(255,255,255,.86);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 34px;
      box-shadow: 0 24px 80px rgba(0,0,0,.12);
      padding: 26px;
      margin-bottom: 32px;
      animation: cardReveal .75s ease .42s both;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-item {
      background: #fff;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 14px 36px rgba(0,0,0,.05);
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 8px;
    }

    .summary-value {
      color: var(--green);
      font-size: 20px;
      font-weight: 900;
      line-height: 1.35;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 28px;
      align-items: start;
    }

    .card {
      background: #fff;
      border-radius: 34px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 16px 46px rgba(0,0,0,.06);
      padding: 30px;
      margin-bottom: 28px;
      animation: cardReveal .7s ease both;
    }

    .section-kicker {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 22px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: -1.6px;
    }

    .gallery-card {
      padding: 0;
      overflow: hidden;
    }

    .main-image-wrap {
      position: relative;
      overflow: hidden;
      background: #ddd;
    }

    .main-image {
      width: 100%;
      height: 620px;
      object-fit: cover;
      transition: transform .5s ease;
    }

    .main-image-wrap:hover .main-image {
      transform: scale(1.03);
    }

    .thumbs {
      display: flex;
      gap: 12px;
      padding: 18px;
      overflow-x: auto;
      background: #fff;
    }

    .thumbs img {
      width: 96px;
      height: 72px;
      object-fit: cover;
      border-radius: 14px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: .74;
      transition: opacity .22s ease, border-color .22s ease, transform .22s ease;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: var(--green);
      transform: translateY(-2px);
    }

    .desc {
      color: #333;
      line-height: 2;
      white-space: pre-line;
      font-size: 16px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .details-item {
      background: #F7F5F0;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 20px;
      padding: 18px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 8px;
    }

    .value {
      color: var(--dark);
      font-weight: 900;
      line-height: 1.45;
    }

    .map-frame {
      width: 100%;
      height: 380px;
      border: 0;
      border-radius: 26px;
      margin-top: 18px;
    }

    .map-link {
      margin-top: 18px;
      height: 50px;
      padding: 0 20px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .agent-card {
      position: sticky;
      top: 110px;
      background:
        linear-gradient(rgba(27,67,50,.94), rgba(27,67,50,.96)),
        url("/images/hero-residential-green.jpg") center/cover no-repeat;
      color: #fff;
      border-radius: 34px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.18);
      animation: cardReveal .7s ease .5s both;
    }

    .agent-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .agent-top img {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      object-fit: cover;
      background: #eee;
      border: 1px solid rgba(255,255,255,.2);
    }

    .agent-name {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.3;
    }

    .agent-sub {
      color: rgba(255,255,255,.72);
      font-size: 13px;
      margin-top: 4px;
    }

    .form-control {
      width: 100%;
      height: 50px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 0 15px;
      margin-bottom: 10px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255,255,255,.08);
      color: #fff;
      outline: none;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,.62);
    }

    textarea.form-control {
      height: 120px;
      padding-top: 14px;
      resize: vertical;
    }

    .detail-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease;
    }

    .detail-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
    }

    .detail-btn-wa {
      background: #25D366;
      color: #fff;
    }

    .detail-btn-dark {
      background: #fff;
      color: var(--green);
    }

    .detail-btn-outline {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,.2);
    }

    .cta-card {
      background:
        linear-gradient(rgba(27,67,50,.92), rgba(27,67,50,.96)),
        url("/images/hero-residential-green.jpg") center/cover no-repeat;
      color: #fff;
      text-align: center;
    }

    .cta-card p {
      margin: 0 auto;
      max-width: 760px;
      color: rgba(255,255,255,.82);
      line-height: 1.9;
    }

    .cta-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    @media (max-width: 1100px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .agent-card {
        position: relative;
        top: auto;
      }
    }

    @media (max-width: 700px) {
      .container {
        width: calc(100% - 24px);
      }

      .listing-hero {
        min-height: 650px;
      }

      .hero-inner {
        padding: 150px 0 100px;
      }

      .hero-title {
        letter-spacing: -1.7px;
      }

      .hero-price,
      .hero-btn {
        width: 100%;
      }

      .summary-grid,
      .details-grid {
        grid-template-columns: 1fr;
      }

      .summary-card,
      .card,
      .agent-card {
        border-radius: 26px;
      }

      .card,
      .agent-card {
        padding: 24px;
      }

      .gallery-card {
        padding: 0;
      }

      .main-image {
        height: 360px;
      }

      .map-frame {
        height: 320px;
      }
    }
    
.hero-center-watermark {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;

  background: rgba(255,255,255,0.08);

  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.12);

  box-shadow:
    0 8px 32px rgba(0,0,0,0.18),
    inset 0 1px 1px rgba(255,255,255,0.12);

  pointer-events: none;
}

@media (min-width: 821px) {
  .hero-center-watermark {
    top: 470px;

    width: 1300px;
    height: 62px;

    border-radius: 14px;
  }
}

@media (max-width: 820px) {
  .hero-center-watermark {
    bottom: 300px;

    width: 400px;
    height: 42px;

    border-radius: 10px;
  }
}
  </style>
</head>

<body>

<div id="site-header"></div>

<div id="app" class="loading">Loading listing...</div>

<div id="site-footer"></div>

<script type="module" src="/shared-layout.js?v=80"></script>

<script type="module">
  import {
    initializeApp,
    getApps,
    getApp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
    authDomain: "residentialpropertykl.firebaseapp.com",
    projectId: "residentialpropertykl",
    storageBucket: "residentialpropertykl.firebasestorage.app",
    messagingSenderId: "952845303526",
    appId: "1:952845303526:web:7b604dca11ad50a93bc527",
    measurementId: "G-DV21X2EGJ0"
  };

  const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const appDiv = document.getElementById("app");

function getListingKeyFromUrl() {
  const parts = window.location.pathname.split("/").filter(Boolean);
  if (parts[0] !== "listing" || !parts[1]) return null;

  const fullSlug = decodeURIComponent(parts[1]);
  const split = fullSlug.split("-");

  return {
    fullSlug,
    id: split[split.length - 1],
    slug: fullSlug
  };
}

const listingKey = getListingKeyFromUrl();

  function formatPrice(price, listingType) {
    if (!price) return "Price on request";

    const num = Number(String(price).replace(/[^\d.]/g, ""));

    if (!Number.isNaN(num) && num > 0) {
      if (listingType === "rent") return `RM ${num.toLocaleString()}/month`;
      return `RM ${num.toLocaleString()}`;
    }

    return String(price);
  }

  function escapeHtml(value = "") {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function safeText(value) {
    return value ? String(value) : "-";
  }

  function getGallery(data) {
    const gallery = Array.isArray(data.gallery) ? data.gallery : [];
    const images = [];

    if (data.image) images.push(data.image);

    gallery.forEach((url) => {
      if (url && !images.includes(url)) images.push(url);
    });

    return images;
  }

  function buildBadges(listingType, hotOffer) {
    const saleRent = listingType === "rent" ? "For Rent" : "For Sale";

    return `
      <div class="hero-badges">
        <span class="detail-badge">${saleRent}</span>
        ${hotOffer ? `<span class="detail-badge hot">Hot Offer</span>` : ""}
      </div>
    `;
  }

  window.changeMainImage = function(url, element) {
    const mainImage = document.getElementById("mainImage");
    if (!mainImage) return;

    mainImage.src = url;

    document.querySelectorAll(".thumbs img").forEach(img => {
      img.classList.remove("active");
    });

    if (element) element.classList.add("active");
  };

  async function loadListing() {
    if (!listingKey) {
      appDiv.innerHTML = `<div class="error">Invalid listing URL.</div>`;
      return;
    }

    try {
let snap = null;

if (listingKey.id) {
  snap = await getDoc(doc(db, "listings", listingKey.id));
}

if (!snap || !snap.exists()) {
  const q = query(
    collection(db, "listings"),
    where("slug", "==", listingKey.slug)
  );

  const snapshot = await getDocs(q);

  if (snapshot.empty) {
    appDiv.innerHTML = `<div class="error">Listing not found.</div>`;
    return;
  }

  snap = snapshot.docs[0];
}

const data = snap.data();

      const pageTitle = data.title || "Property Detail";
      const gallery = getGallery(data);
      const mainImage = gallery[0] || "/images/hero-residential-green.jpg";

      document.title = `${pageTitle} | Residential Property KL`;

      const metaDesc = document.getElementById("meta-desc");
      if (metaDesc) {
        metaDesc.setAttribute(
          "content",
          `${pageTitle} in ${data.location || ""}. ${data.type || ""} ${data.listingType === "rent" ? "for rent" : "for sale"} in Kuala Lumpur / Selangor.`
        );
      }

      const canonical = document.getElementById("canonical-link");
      if (canonical) {
        canonical.href = `https://residentialpropertykl.com${window.location.pathname}`;
      }

      const structuredData = {
        "@context": "https://schema.org",
        "@type": "Product",
        name: pageTitle,
        description: data.description || "",
        image: mainImage,
        offers: {
          "@type": "Offer",
          price: String(data.price || "").replace(/[^\d.]/g, ""),
          priceCurrency: "MYR",
          availability: "https://schema.org/InStock"
        }
      };

      const oldSchema = document.getElementById("listing-schema");
      if (oldSchema) oldSchema.remove();

      const script = document.createElement("script");
      script.id = "listing-schema";
      script.type = "application/ld+json";
      script.text = JSON.stringify(structuredData);
      document.head.appendChild(script);

      const safeTitle = escapeHtml(pageTitle);
      const safeLocation = escapeHtml(safeText(data.location));
      const safeAddress = escapeHtml(safeText(data.address || data.location));
      const safeDescription = escapeHtml(safeText(data.description));
      const safeType = escapeHtml(safeText(data.type));
      const safeBua = escapeHtml(safeText(data.bua));
      const safeLandArea = escapeHtml(safeText(data.landArea));
      const safeBedrooms = escapeHtml(safeText(data.bedrooms));
      const safeBathrooms = escapeHtml(safeText(data.bathrooms));
      const safeCarPark = escapeHtml(safeText(data.carPark));
      const safeTenure = escapeHtml(safeText(data.tenure));
      const safeMaintenanceFee = escapeHtml(safeText(data.maintenanceFee));
      const safeFeatures = escapeHtml(safeText(data.features));

      const priceText = formatPrice(data.price, data.listingType);

      const whatsappText = encodeURIComponent(`Hi, I am interested in ${pageTitle}.`);
      const phone = data.agentPhone
        ? String(data.agentPhone).replace(/\D/g, "")
        : "60166287357";

      const whatsappLink = `https://wa.me/${phone}?text=${whatsappText}`;

      const thumbsHtml = gallery.map((img, index) => `
        <img
          src="${img}"
          alt="Thumbnail ${index + 1}"
          class="${index === 0 ? "active" : ""}"
          onclick="changeMainImage('${img.replace(/'/g, "\\'")}', this)"
        >
      `).join("");

      appDiv.className = "";
      appDiv.innerHTML = `
        <section class="listing-hero">
          <div class="listing-hero-bg" style="background-image:url('${mainImage}')"></div>
          <div class="listing-hero-overlay"></div>

<div class="hero-center-watermark">
</div>

          <div class="container hero-inner">
            <div class="breadcrumb">
              <a href="/">Home</a>
              <span>›</span>
              <a href="/categories/all-listings">All Listings</a>
              <span>›</span>
              <span>${safeTitle}</span>
            </div>

            ${buildBadges(data.listingType || "sale", data.hotOffer)}

            <h1 class="hero-title">${safeTitle}</h1>

            <div class="hero-location">📍 ${safeLocation}</div>

            <div class="hero-price-row">
              <div class="hero-price">${priceText}</div>
              <a href="${whatsappLink}" target="_blank" class="hero-btn hero-btn-wa">WhatsApp Us</a>
              <a href="/categories/all-listings" class="hero-btn hero-btn-dark">View More Listings</a>
            </div>
          </div>
        </section>

        <main class="detail-main">
          <div class="container">

            <div class="summary-card">
              <div class="summary-grid">
                <div class="summary-item">
                  <div class="summary-label">Property Type</div>
                  <div class="summary-value">${safeType}</div>
                </div>

                <div class="summary-item">
                  <div class="summary-label">Built-up</div>
                  <div class="summary-value">${safeBua}</div>
                </div>

                <div class="summary-item">
                  <div class="summary-label">Land Area</div>
                  <div class="summary-value">${safeLandArea}</div>
                </div>

                <div class="summary-item">
                  <div class="summary-label">Bedrooms</div>
                  <div class="summary-value">${safeBedrooms}</div>
                </div>

                <div class="summary-item">
                  <div class="summary-label">Status</div>
                  <div class="summary-value">${data.listingType === "rent" ? "For Rent" : "For Sale"}</div>
                </div>
              </div>
            </div>

            <div class="content-grid">
              <div>

                <section class="card gallery-card">
                  <div class="main-image-wrap">
                    <img id="mainImage" class="main-image" src="${mainImage}" alt="${safeTitle}">

                    <div class="watermark-box">
                      <span class="watermark-text">RESIDENTIAL PROPERTY KL</span>
                    </div>
                  </div>

                  ${gallery.length > 1 ? `<div class="thumbs">${thumbsHtml}</div>` : ""}
                </section>

                <section class="card">
                  <div class="section-kicker">Description</div>
                  <h2>Property Overview</h2>
                  <div class="desc">${safeDescription}</div>
                </section>

                <section class="card">
                  <div class="section-kicker">Property Information</div>
                  <h2>Details</h2>

                  <div class="details-grid">
                    <div class="details-item">
                      <div class="label">Price</div>
                      <div class="value">${priceText}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Property Type</div>
                      <div class="value">${safeType}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Built-up Size</div>
                      <div class="value">${safeBua}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Land Area</div>
                      <div class="value">${safeLandArea}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Bedrooms</div>
                      <div class="value">${safeBedrooms}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Bathrooms</div>
                      <div class="value">${safeBathrooms}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Car Park</div>
                      <div class="value">${safeCarPark}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Tenure</div>
                      <div class="value">${safeTenure}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Maintenance Fee</div>
                      <div class="value">${safeMaintenanceFee}</div>
                    </div>

                    <div class="details-item">
                      <div class="label">Features</div>
                      <div class="value">${safeFeatures}</div>
                    </div>
                  </div>
                </section>

                <section class="card">
                  <div class="section-kicker">Location</div>
                  <h2>Address</h2>

                  <div class="desc">${safeAddress}</div>

                  ${data.googleMapsLink ? `
                    <a class="map-link" href="${data.googleMapsLink}" target="_blank" rel="noopener noreferrer">
                      Open Google Maps
                    </a>
                  ` : ""}

                  <iframe
                    class="map-frame"
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    src="https://www.google.com/maps?q=${encodeURIComponent(data.address || data.location || "Kuala Lumpur Malaysia")}&output=embed">
                  </iframe>
                </section>

                <section class="card cta-card">
                  <div class="section-kicker" style="color:#EADFCB;">Residential Property KL</div>
                  <h2>Interested in This Property?</h2>
                  <p>
                    Contact Residential Property KL for viewing arrangement,
                    updated availability and suitable residential recommendations.
                  </p>

                  <div class="cta-actions">
                    <a href="${whatsappLink}" target="_blank" class="hero-btn hero-btn-wa">WhatsApp Us</a>
                    <a href="/contact.html" class="hero-btn hero-btn-dark">Contact Us</a>
                  </div>
                </section>

              </div>

              <aside class="agent-card">
                <div class="agent-top">
                  <img src="${data.agentImage || "/images/listingphoto.png"}" alt="Residential Property KL Group">
                  <div>
                    <div class="agent-name">${escapeHtml(data.agentName || "Residential Property KL Group")}</div>
                    <div class="agent-sub">Residential Property Specialist</div>
                  </div>
                </div>

                <input class="form-control" type="text" placeholder="Name">
                <input class="form-control" type="text" placeholder="Phone">
                <input class="form-control" type="email" placeholder="Email">

                <textarea class="form-control">Hello, I am interested in ${safeTitle}</textarea>

                <a class="detail-btn detail-btn-wa" href="${whatsappLink}" target="_blank">WhatsApp</a>
                <a class="detail-btn detail-btn-dark" href="tel:${phone}">Call Agent</a>
                <a class="detail-btn detail-btn-outline" href="/contact.html">Contact Page</a>
              </aside>
            </div>

          </div>
        </main>
      `;

    } catch (error) {
      console.error(error);
      appDiv.innerHTML = `<div class="error">Failed to load listing.</div>`;
    }
  }

  loadListing();
</script>

<div id="floating-nav-placeholder"></div>

<script>
  fetch("/floating-nav.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("floating-nav-placeholder").innerHTML = html;

      const btn = document.getElementById("navFloatBtn");
      const menu = document.getElementById("floatNavMenu");
      const waMenu = document.getElementById("waSlideMenu");

      if (btn && menu && waMenu) {
        btn.addEventListener("click", () => {
          menu.classList.toggle("hidden");
          waMenu.classList.toggle("show");
        });
      }
    });
</script>

</body>
</html>
