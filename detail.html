<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Detail | Residential Property KL</title>
  <meta name="theme-color" content="#3F6FB5">
  <link rel="stylesheet" href="shared-layout.css" />
  <style>
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 24px 40px;
    }

    .breadcrumb {
      font-size: 13px;
      color: #8a8a8a;
      margin-bottom: 18px;
    }

    .breadcrumb a {
      color: #8a8a8a;
    }

    .breadcrumb span.sep {
      margin: 0 8px;
    }

    .top-info {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
      align-items: flex-start;
    }

    .title-wrap h1 {
      margin: 0 0 10px;
      font-size: 38px;
      line-height: 1.2;
    }

    .location {
      color: #666;
      margin-bottom: 12px;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-badge {
      display: inline-block;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      color: white;
      border-radius: 4px;
      background: #333;
    }

    .detail-badge.hot {
      background: #e53935;
    }

    .price {
      font-size: 34px;
      font-weight: bold;
      color: #111;
      white-space: nowrap;
    }

    .content {
      display: grid;
      grid-template-columns: 2fr 340px;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
      border: 1px solid #eee;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }

    .main-image {
      width: 100%;
      height: 520px;
      object-fit: cover;
      border-radius: 8px;
      background: #eee;
    }

    .thumbs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      overflow-x: auto;
    }

    .thumbs img {
      width: 90px;
      height: 70px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      background: #eee;
    }

    .thumbs img.active {
      border-color: #f0b132;
    }

    .overview-grid,
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
      margin-top: 16px;
    }

    .overview-item,
    .details-item {
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    .value {
      font-weight: bold;
    }

    .desc {
      line-height: 1.7;
      white-space: pre-line;
    }

    .map-link {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 14px;
      background: #1e88e5;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .agent-card img {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      object-fit: cover;
      background: #eee;
    }

    .agent-top {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .agent-name {
      font-weight: bold;
    }

    .form-control {
      width: 100%;
      padding: 11px 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    .detail-btn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-bottom: 10px;
      font-family: inherit;
      font-size: 14px;
    }

.detail-btn-orange {
  background: #1e88e5; /* blue */
  color: white;
}

.detail-btn-outline {
  background: white;
  color: #1e88e5;
  border: 1px solid #1e88e5;
}

    .loading,
    .error {
      text-align: center;
      padding: 60px 20px;
      font-size: 18px;
    }

    @media (max-width: 1100px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
  .top-info {
    flex-direction: column;
    align-items: flex-start;
  }

  .price {
    font-size: 28px;
    width: 100%;
    white-space: normal;        /* 🔥 allow wrap */
    overflow-wrap: break-word;  /* 🔥 force next line */
    word-break: break-word;
  }

      .title-wrap h1 {
        font-size: 28px;
      }

      .main-image {
        height: 300px;
      }

      .overview-grid,
      .details-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="page">
    <div id="app" class="loading">Loading listing...</div>
  </div>

  <div id="site-footer"></div>

  <script type="module" src="shared-layout.js"></script>
  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKO4RNc5r8GoPHQyRHdUllLVwtXFNJyVo",
  authDomain: "residentialpropertykl.firebaseapp.com",
  projectId: "residentialpropertykl",
  storageBucket: "residentialpropertykl.firebasestorage.app",
  messagingSenderId: "952845303526",
  appId: "1:952845303526:web:7b604dca11ad50a93bc527",
  measurementId: "G-DV21X2EGJ0"
};
    
    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    
    const db = getFirestore(app);
    const appDiv = document.getElementById("app");

    const params = new URLSearchParams(window.location.search);
    const listingId = params.get("id");

function formatPrice(price) {
  if (!price) return "";
  return price;   // 🔥 just return what you typed
}

    function buildBadge(listingType, hotOffer) {
      const saleRent = listingType === "rent" ? "FOR RENT" : "FOR SALE";
      return `
        <div class="badges">
          <span class="detail-badge">${saleRent}</span>
          ${hotOffer ? `<span class="detail-badge hot">HOT OFFER</span>` : ""}
        </div>
      `;
    }

    function getGallery(data) {
      const gallery = Array.isArray(data.gallery) ? data.gallery : [];
      const allImages = [];
      if (data.image) allImages.push(data.image);
      gallery.forEach(url => {
        if (url && !allImages.includes(url)) allImages.push(url);
      });
      return allImages;
    }

    function safeText(value) {
      return value ? String(value) : "-";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function changeMainImage(url, element) {
      const mainImage = document.getElementById("mainImage");
      if (!mainImage) return;
      mainImage.src = url;
      document.querySelectorAll(".thumbs img").forEach(img => img.classList.remove("active"));
      if (element) element.classList.add("active");
    }

    window.changeMainImage = changeMainImage;

    async function loadListing() {
      if (!listingId) {
        appDiv.innerHTML = `<div class="error">Invalid listing ID</div>`;
        return;
      }

      try {
        const snap = await getDoc(doc(db, "listings", listingId));

        if (!snap.exists()) {
          appDiv.innerHTML = `<div class="error">Listing not found</div>`;
          return;
        }

        const data = snap.data();
        const pageTitle = data.title || "Property Detail";
        const gallery = getGallery(data);
        const mainImage = gallery[0] || "";
        const safeTitle = escapeHtml(pageTitle);
        const safeLocation = escapeHtml(safeText(data.location));
        const safeDescription = escapeHtml(safeText(data.description));
        const safeAddress = escapeHtml(safeText(data.address || data.location));
        const safeType = escapeHtml(safeText(data.type));
        const safeBua = escapeHtml(safeText(data.bua));
        const safeLandArea = escapeHtml(safeText(data.landArea));
        const safeTenure = escapeHtml(safeText(data.tenure));
const safeBedrooms = escapeHtml(safeText(data.bedrooms));
const safeBathrooms = escapeHtml(safeText(data.bathrooms));
const safeCarparks = escapeHtml(safeText(data.carparks));
const safeFurnishing = escapeHtml(safeText(data.furnishing));
        const safeFeatures = escapeHtml(safeText(data.features));
        const safeAgentName = escapeHtml(
          data.agentName && data.agentName !== "-" ? data.agentName : "Kenneth Lai"
        );

        const whatsappText = encodeURIComponent(`Hi Kenneth, I am interested in [${pageTitle}]`);
        const whatsappLink = data.agentPhone
          ? `https://wa.me/${String(data.agentPhone).replace(/\D/g, "")}?text=${whatsappText}`
          : `https://wa.me/60166287357?text=${whatsappText}`;

        document.title = `${pageTitle} | Residential Property KL`;

        const thumbsHtml = gallery.map((img, index) => `
          <img
            src="${img}"
            alt="Thumbnail ${index + 1}"
            class="${index === 0 ? "active" : ""}"
            onclick="changeMainImage('${img.replace(/'/g, "\\'")}', this)"
          >
        `).join("");

        appDiv.className = "";
        appDiv.innerHTML = `
          <div class="breadcrumb">
            <a href="index.html">Home</a>
            <span class="sep">&gt;</span>
            <span>${safeTitle}</span>
          </div>

          <div class="top-info">
            <div class="title-wrap">
              <h1>${safeTitle}</h1>
              <div class="location">📍 ${safeLocation}</div>
              ${buildBadge(data.listingType || "sale", data.hotOffer)}
            </div>
            <div class="price">${formatPrice(data.price, data.listingType)}</div>
          </div>

          <div class="content">
            <div>
              <div class="card">
                ${mainImage ? `<img id="mainImage" class="main-image" src="${mainImage}" alt="${safeTitle}">` : `<div class="main-image"></div>`}
                ${gallery.length ? `<div class="thumbs">${thumbsHtml}</div>` : ""}
              </div>

              <div class="card">
                <h3>Overview</h3>
                <div class="overview-grid">
                  <div class="overview-item">
                    <div class="label">Property Type</div>
                    <div class="value">${safeType}</div>
                  </div>
                  <div class="overview-item">
                    <div class="label">Built-up</div>
                    <div class="value">${safeBua}</div>
                  </div>
                  <div class="overview-item">
                    <div class="label">Land Area</div>
                    <div class="value">${safeLandArea}</div>
                  </div>
                  <div class="overview-item">
                    <div class="label">Property Status</div>
                    <div class="value">${data.listingType === "rent" ? "For Rent" : "For Sale"}</div>
                  </div>
                </div>
              </div>

              <div class="card">
                <h3>Description</h3>
                <div class="desc">${safeDescription}</div>
              </div>

              <div class="card">
                <h3>Address</h3>
                <div class="desc">${safeAddress}</div>
                ${data.googleMapsLink ? `<a class="map-link" href="${data.googleMapsLink}" target="_blank" rel="noopener noreferrer">Open on Google Maps</a>` : ""}

${data.googleMapsLink ? `
  <div style="margin-top:15px;">
    <iframe
      width="100%"
      height="350"
      style="border:0; border-radius:8px;"
      loading="lazy"
      allowfullscreen
      referrerpolicy="no-referrer-when-downgrade"
      src="https://www.google.com/maps?q=${encodeURIComponent(data.address || data.location)}&output=embed">
    </iframe>
  </div>
` : ""}
              </div>



              <div class="card">
                <h3>Details</h3>
                <div class="details-grid">
                  <div class="details-item">
                    <div class="label">Price</div>
                    <div class="value">${formatPrice(data.price, data.listingType)}</div>
                  </div>
                  <div class="details-item">
                    <div class="label">Property Size</div>
                    <div class="value">${safeBua}</div>
                  </div>
                  <div class="details-item">
                    <div class="label">Land Area</div>
                    <div class="value">${safeLandArea}</div>
                  </div>
                  <div class="details-item">
                    <div class="label">Property Type</div>
                    <div class="value">${safeType}</div>
                  </div>
                  <div class="details-item">
                    <div class="label">Tenure</div>
                    <div class="value">${safeTenure}</div>
                  </div>
<div class="details-item">
  <div class="label">Bedrooms</div>
  <div class="value">${safeBedrooms}</div>
</div>

<div class="details-item">
  <div class="label">Bathrooms</div>
  <div class="value">${safeBathrooms}</div>
</div>

<div class="details-item">
  <div class="label">Car Parks</div>
  <div class="value">${safeCarparks}</div>
</div>

<div class="details-item">
  <div class="label">Furnishing</div>
  <div class="value">${safeFurnishing}</div>
</div>
                  <div class="details-item" style="grid-column: 1 / -1;">
                    <div class="label">Features</div>
                    <div class="value">${safeFeatures}</div>
                  </div>
                </div>
              </div>
            </div>

            <div>
              <div class="card agent-card">
                <div class="agent-top">
                  <img src="${data.agentImage || 'https://via.placeholder.com/58x58?text=Agent'}" alt="Agent">
                  <div>
                    <div class="agent-name">${safeAgentName}</div>
                    <div style="color:#777; font-size:13px;">Residential Property Specialist</div>
                  </div>
                </div>

                <input class="form-control" type="text" placeholder="Name">
                <input class="form-control" type="text" placeholder="Phone">
                <input class="form-control" type="email" placeholder="Email">
                <textarea class="form-control" rows="5">Hello, I am interested in [${safeTitle}]</textarea>

                <button class="detail-btn detail-btn-orange" type="button">Send Message</button>
                <a class="detail-btn detail-btn-outline" href="tel:${data.agentPhone || '60166287357'}">Call</a>
                <a class="detail-btn detail-btn-outline" href="${whatsappLink}" target="_blank" rel="noopener noreferrer">WhatsApp</a>
              </div>
            </div>
          </div>
        `;
      } catch (error) {
        console.error(error);
        appDiv.innerHTML = `<div class="error">Failed to load listing</div>`;
      }
    }

    loadListing();
  </script>
</body>
</html>
